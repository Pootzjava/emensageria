{% extends "esocial/base.html" %}
{% load static %}

{% block title %}S2201 - Desligamento (v1.3){% endblock %}

{% block content %}
<div class="container">
    <h1>S2201 - Desligamento</h1>
    <p>Versão do Layout: v_S_01_03_00</p>
    
    <form method="post" action="{% url 'esocial:enviar_evento' %}">
        {% csrf_token %}
        
        <fieldset>
            <legend>Identificação do Evento</legend>
            <div class="form-group">
                <label for="tpAmb">Tipo de Ambiente:</label>
                <select name="tpAmb" id="tpAmb" required>
                    <option value="">Selecione...</option>
                    <option value="1">Produção</option>
                    <option value="2">Produção Restrita</option>
                </select>
            </div>
            <div class="form-group">
                <label for="procEmi">Processo de Emissão:</label>
                <select name="procEmi" id="procEmi" required>
                    <option value="">Selecione...</option>
                    <option value="1">Aplicativo do empregador</option>
                    <option value="2">Aplicativo governamental - Doméstico</option>
                    <option value="3">Aplicativo governamental - Web Geral</option>
                    <option value="4">Aplicativo governamental - Simplificado Pessoa Jurídica</option>
                    <option value="5">Aplicativo governamental - Segurado Especial</option>
                </select>
            </div>
            <div class="form-group">
                <label for="verProc">Versão do Processo:</label>
                <input type="text" name="verProc" id="verProc" value="1.3.0" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Identificação do Empregador</legend>
            <div class="form-group">
                <label for="tpInsc">Tipo de Inscrição:</label>
                <select name="tpInsc" id="tpInsc" required>
                    <option value="">Selecione...</option>
                    <option value="1">CNPJ</option>
                    <option value="2">CPF</option>
                </select>
            </div>
            <div class="form-group">
                <label for="nrInsc">Número de Inscrição:</label>
                <input type="text" name="nrInsc" id="nrInsc" required maxlength="14">
            </div>
        </fieldset>

        <fieldset>
            <legend>Informações do Evento</legend>
            <div class="form-group">
                <label for="evtDeslig">Evtdeslig:</label>
                <input type="text" name="evtDeslig" id="evtDeslig">
            </div>
            <div class="form-group">
                <label for="infoDeslig">Infodeslig:</label>
                <input type="text" name="infoDeslig" id="infoDeslig">
            </div>
            <div class="form-group">
                <label for="mtvDeslig">Mtvdeslig:</label>
                <input type="text" name="mtvDeslig" id="mtvDeslig">
            </div>
            <div class="form-group">
                <label for="dtDeslig">Dtdeslig:</label>
                <input type="text" name="dtDeslig" id="dtDeslig">
            </div>
            <div class="form-group">
                <label for="dtAvPrv">Dtavprv:</label>
                <input type="text" name="dtAvPrv" id="dtAvPrv">
            </div>
            <div class="form-group">
                <label for="indPagtoAPI">Indpagtoapi:</label>
                <input type="text" name="indPagtoAPI" id="indPagtoAPI">
            </div>
            <div class="form-group">
                <label for="dtProjFimAPI">Dtprojfimapi:</label>
                <input type="text" name="dtProjFimAPI" id="dtProjFimAPI">
            </div>
            <div class="form-group">
                <label for="pensAlim">Pensalim:</label>
                <input type="text" name="pensAlim" id="pensAlim">
            </div>
            <div class="form-group">
                <label for="percAliment">Percaliment:</label>
                <input type="text" name="percAliment" id="percAliment">
            </div>
            <div class="form-group">
                <label for="vrAlim">Vralim:</label>
                <input type="text" name="vrAlim" id="vrAlim">
            </div>
            <div class="form-group">
                <label for="nrProcTrab">Nrproctrab:</label>
                <input type="text" name="nrProcTrab" id="nrProcTrab">
            </div>
            <div class="form-group">
                <label for="indPDV">Indpdv:</label>
                <input type="text" name="indPDV" id="indPDV">
            </div>
            <div class="form-group">
                <label for="infoInterm">Infointerm:</label>
                <input type="text" name="infoInterm" id="infoInterm">
            </div>
            <div class="form-group">
                <label for="observacoes">Observacoes:</label>
                <input type="text" name="observacoes" id="observacoes">
            </div>
            <div class="form-group">
                <label for="observacao">Observacao:</label>
                <input type="text" name="observacao" id="observacao">
            </div>
        </fieldset>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Gerar XML</button>
            <button type="reset" class="btn btn-secondary">Limpar</button>
        </div>
    </form>
</div>
{% endblock %}
