{% extends "esocial/base.html" %}
{% load static %}

{% block title %}S5504 - FGTS (v1.3){% endblock %}

{% block content %}
<div class="container">
    <h1>S5504 - FGTS</h1>
    <p>Versão do Layout: v_S_01_03_00</p>
    
    <form method="post" action="{% url 'esocial:enviar_evento' %}">
        {% csrf_token %}
        
        <fieldset>
            <legend>Identificação do Evento</legend>
            <div class="form-group">
                <label for="tpAmb">Tipo de Ambiente:</label>
                <select name="tpAmb" id="tpAmb" required>
                    <option value="">Selecione...</option>
                    <option value="1">Produção</option>
                    <option value="2">Produção Restrita</option>
                </select>
            </div>
            <div class="form-group">
                <label for="procEmi">Processo de Emissão:</label>
                <select name="procEmi" id="procEmi" required>
                    <option value="">Selecione...</option>
                    <option value="1">Aplicativo do empregador</option>
                    <option value="2">Aplicativo governamental - Doméstico</option>
                    <option value="3">Aplicativo governamental - Web Geral</option>
                    <option value="4">Aplicativo governamental - Simplificado Pessoa Jurídica</option>
                    <option value="5">Aplicativo governamental - Segurado Especial</option>
                </select>
            </div>
            <div class="form-group">
                <label for="verProc">Versão do Processo:</label>
                <input type="text" name="verProc" id="verProc" value="1.3.0" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>Identificação do Empregador</legend>
            <div class="form-group">
                <label for="tpInsc">Tipo de Inscrição:</label>
                <select name="tpInsc" id="tpInsc" required>
                    <option value="">Selecione...</option>
                    <option value="1">CNPJ</option>
                    <option value="2">CPF</option>
                </select>
            </div>
            <div class="form-group">
                <label for="nrInsc">Número de Inscrição:</label>
                <input type="text" name="nrInsc" id="nrInsc" required maxlength="14">
            </div>
        </fieldset>

        <fieldset>
            <legend>Informações do Evento</legend>
            <div class="form-group">
                <label for="evtFGTS">Evtfgts:</label>
                <input type="text" name="evtFGTS" id="evtFGTS">
            </div>
            <div class="form-group">
                <label for="infoFGTS">Infofgts:</label>
                <input type="text" name="infoFGTS" id="infoFGTS">
            </div>
            <div class="form-group">
                <label for="nrRecArqBase">Nrrecarqbase:</label>
                <input type="text" name="nrRecArqBase" id="nrRecArqBase">
            </div>
            <div class="form-group">
                <label for="indExistInfo">Indexistinfo:</label>
                <input type="text" name="indExistInfo" id="indExistInfo">
            </div>
            <div class="form-group">
                <label for="tpInsc">Tpinsc:</label>
                <input type="text" name="tpInsc" id="tpInsc">
            </div>
            <div class="form-group">
                <label for="nrInsc">Nrinsc:</label>
                <input type="text" name="nrInsc" id="nrInsc">
            </div>
            <div class="form-group">
                <label for="codLotacao">Codlotacao:</label>
                <input type="text" name="codLotacao" id="codLotacao">
            </div>
            <div class="form-group">
                <label for="tpLotacao">Tplotacao:</label>
                <input type="text" name="tpLotacao" id="tpLotacao">
            </div>
            <div class="form-group">
                <label for="infoBaseFGTS">Infobasefgts:</label>
                <input type="text" name="infoBaseFGTS" id="infoBaseFGTS">
            </div>
            <div class="form-group">
                <label for="basePerApur">Baseperapur:</label>
                <input type="text" name="basePerApur" id="basePerApur">
            </div>
            <div class="form-group">
                <label for="tpValor">Tpvalor:</label>
                <input type="text" name="tpValor" id="tpValor">
            </div>
            <div class="form-group">
                <label for="indIncid">Indincid:</label>
                <input type="text" name="indIncid" id="indIncid">
            </div>
            <div class="form-group">
                <label for="baseFGTS">Basefgts:</label>
                <input type="text" name="baseFGTS" id="baseFGTS">
            </div>
            <div class="form-group">
                <label for="vrFGTS">Vrfgts:</label>
                <input type="text" name="vrFGTS" id="vrFGTS">
            </div>
            <div class="form-group">
                <label for="notAFT">Notaft:</label>
                <input type="text" name="notAFT" id="notAFT">
            </div>
        </fieldset>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Gerar XML</button>
            <button type="reset" class="btn btn-secondary">Limpar</button>
        </div>
    </form>
</div>
{% endblock %}
